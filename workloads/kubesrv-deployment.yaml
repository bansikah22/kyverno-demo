apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesrv-deployment
  labels:
    app: kubesrv
    owner: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubesrv
  template:
    metadata:
      labels:
        app: kubesrv
        owner: demo
    spec:
      containers:
        - name: kubesrv
          image: bansikah/kubesrv:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            privileged: false
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: kubesrv-service
spec:
  selector:
    app: kubesrv
  ports:
    - port: 8080
      targetPort: 80
  type: ClusterIP